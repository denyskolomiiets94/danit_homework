version: '3.9'

services:
  app:
    build: .
    container_name: students_app
    ports:
      - "8000:8000"

  nginx:
    image: nginx:latest
    container_name: students_nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app